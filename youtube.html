<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube.com clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      p{
        font-family: "Roboto", arial;
        margin-top: 0;
        margin-bottom: 0;
      }
      .thumbnail {
        width: 300px;
        display: block;
      }
      .search-bar {
        display: block;
      }
      .vd-preview {
        width: 300px;
        display: inline-block;
        vertical-align: top;
        margin-right: 15px;
      }
      .channel-pfp {
        display: inline-block;
        width: 50px;
        vertical-align: top;
      }
      .vd-info {
        display: inline-block;
        width: 200px;
      }
      .pfp {
        width: 40px;
        border-radius: 50%;
      }
      .vd-title {
        margin-top: 0;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        margin-bottom: 12px;
      }
      .thumbnail-row {
        margin-bottom: 12px;
      }
      .vd-author, .vd-stats {
        margin: 0;
        font-size: 12px;
        color: #606060;
      }
      .vd-author{
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <input class="search-bar" type="text" placeholder="Search" />
    <div class="vd-preview">
      <div class="thumbnail-row">
        <img
          class="thumbnail"
          src="https://picsum.photos/640/360"
          alt="Thumbnail"
        />
      </div>
      <div>
        <div class="channel-pfp">
          <img class="pfp" src="https://i.pravatar.cc/64" alt="Thumbnail" />
        </div>
        <div class="vd-info">
          <p class="vd-title">the doors and their secrets</p>
          <p class="vd-author">mark linen</p>
          <p class="vd-stats">3.4M views &#183; 6 months ago</p>
        </div>
      </div>
    </div>
    <div class="vd-preview">
      <div class="thumbnail-row">
        <img
          class="thumbnail"
          src="https://picsum.photos/620/360"
          alt="Thumbnail"
        />
      </div>
      <div>
        <div class="channel-pfp">
          <img class="pfp" src="https://i.pravatar.cc/54" alt="Thumbnail" />
        </div>
        <div class="vd-info">
          <p class="vd-title">take a closer look into the nature</p>
          <p class="vd-author">sofia clark</p>
          <p class="vd-stats">1.2M views &#183; 2 months ago</p>
        </div>
      </div>
    </div>
  </body>
</html>
