<Style>
  .subscribe {
    background-color: rgb(200,0,0);
    color: white;
    border : none;
    height: 34px;
    width: 105px;
    border-radius: 2px;
    cursor: pointer;
    margin-right: 10px;
    transition: opacity 0.15s;
  }
  
  .join{
    background-color: rgb(255,255,255);
    border-color: rgb(16, 127, 218);
    border-style: solid;
    border-width: 1px;
    color: rgb(16, 127, 218);
    height: 34px;
    width: 65px;
    border-radius: 2px;
    cursor: pointer;
    transition: background-color 0.15s, color 0.15s;
  }
  .tweet{
    background-color: rgb(16, 127, 218);
    color: white;
    border : none;
    height: 34px;
    width: 75px;
    border-radius: 18px;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    margin-left: 10px;
    transition: box-shadow 0.15s;
  }
  .subscribe:hover{
    opacity: 0.8;
  }
  .subscribe:active{
    opacity: 0.5;
  }
  .join:hover{
    background-color: rgb(16, 127, 218);
    color: white;
  }
  .join:active{
    opacity: 0.7;
  }
  .tweet:hover{
    box-shadow: 0 2px 2px rgba(0,0,0,0.2);
  }
</Style>
<button class="subscribe">
  SUBSCRIBE
</button>
<button class="join">
  JOIN
</button>
<button class="tweet">
  Tweet
</button>
